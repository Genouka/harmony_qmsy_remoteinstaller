<!DOCTYPE html>
<html lang="zh">
<head>
    <title>Qmsy Forwarder 状态</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            width: 380px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .status.checking {
            background: #fff3cd;
            color: #856404;
        }
        .connection-list {
            max-height: 250px;
            overflow-y: auto;
        }
        .connection-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #f9f9f9;
            position: relative;
        }
        .connection-item .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .connection-item .port {
            font-weight: bold;
            color: #0066cc;
            font-size: 14px;
        }
        .connection-item .badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #28a745;
            color: white;
        }
        .connection-item .badge.idle {
            background: #ffc107;
            color: #000;
        }
        .connection-item .server {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .connection-item .idle-time {
            font-size: 11px;
            color: #999;
        }
        .connection-item .actions {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.85;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-warning {
            background: #ffc107;
            color: #000;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 30px 20px;
            font-size: 13px;
        }
        .error-msg {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        .last-update {
            text-align: right;
            font-size: 11px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>
        Qmsy Forwarder
        <span id="conn-count" style="font-size: 12px; color: #666; font-weight: normal;">检查中...</span>
    </h2>
    
    <div id="status" class="status checking">
        <span>检查连接状态...</span>
        <span id="total-stats"></span>
    </div>
    
    <div class="toolbar" id="toolbar" style="display: none;">
        <button class="btn btn-danger" onclick="disconnectAll()">断开全部</button>
        <button class="btn btn-secondary" onclick="refresh()">刷新</button>
    </div>
    
    <div id="connections" class="connection-list"></div>
    
    <div class="last-update" id="last-update"></div>

    <script>
        let isRefreshing = false;
        let autoRefreshTimer = null;

        async function updateStatus() {
            if (isRefreshing) return;
            isRefreshing = true;

            try {
                const response = await chrome.runtime.sendMessage({
                    action: 'QMSY_LIST_CONNECTIONS'
                });

                const statusEl = document.getElementById('status');
                const connectionsEl = document.getElementById('connections');
                const toolbarEl = document.getElementById('toolbar');
                const connCountEl = document.getElementById('conn-count');
                const lastUpdateEl = document.getElementById('last-update');

                if (response.connections && response.connections.length > 0) {
                    const connCount = response.connections.length;
                    statusEl.innerHTML = `
                        <span>✓ 运行中 (${connCount} 个连接)</span>
                    `;
                    statusEl.className = 'status connected';
                    toolbarEl.style.display = 'flex';
                    connCountEl.textContent = `${connCount} 个连接`;

                    connectionsEl.innerHTML = response.connections.map(conn => {
                        // 计算空闲时间显示
                        const idleSeconds = Math.floor(conn.idleTime / 1000);
                        const idleText = idleSeconds < 60 ? `${idleSeconds}秒` : 
                                        idleSeconds < 3600 ? `${Math.floor(idleSeconds/60)}分钟` : 
                                        `${Math.floor(idleSeconds/3600)}小时`;
                        const isIdle = conn.idleTime > 60000; // 1分钟视为空闲
                        
                        return `
                            <div class="connection-item">
                                <div class="header">
                                    <span class="port">端口: ${conn.port}</span>
                                    <span class="badge ${isIdle ? 'idle' : ''}">${isIdle ? '空闲' : '活跃'}</span>
                                </div>
                                <div class="server">服务器: ${conn.server}</div>
                                <div class="idle-time">空闲时间: ${idleText}</div>
                                <div class="actions">
                                    <button class="btn btn-danger" onclick="disconnect('${conn.id}')" ${conn.disconnecting ? 'disabled' : ''}>
                                        ${conn.disconnecting ? '断开中...' : '断开'}
                                    </button>
                                    <button class="btn btn-warning" onclick="disconnectForce('${conn.id}')">强制断开</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    statusEl.innerHTML = '<span>未连接</span>';
                    statusEl.className = 'status disconnected';
                    toolbarEl.style.display = 'none';
                    connCountEl.textContent = '无连接';
                    connectionsEl.innerHTML = '<div class="empty">暂无活动连接<br><small>在页面中使用 QmsyClient 建立连接</small></div>';
                }

                lastUpdateEl.textContent = '最后更新: ' + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('status').innerHTML = `
                    <span>✗ 扩展未激活</span>
                    <span class="error-msg">${error.message}</span>
                `;
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('toolbar').style.display = 'none';
                document.getElementById('conn-count').textContent = '错误';
            } finally {
                isRefreshing = false;
            }
        }

        async function disconnect(connectionId) {
            try {
                const response = await chrome.runtime.sendMessage({
                    action: 'QMSY_DISCONNECT',
                    connectionId: connectionId,
                    reason: 'Disconnected from popup'
                });
                
                if (response.success) {
                    // 立即刷新显示断开中状态
                    updateStatus();
                    // 延迟后再次刷新确认状态
                    setTimeout(updateStatus, 500);
                } else {
                    alert('断开失败: ' + (response.error || '未知错误'));
                }
            } catch (error) {
                alert('断开请求失败: ' + error.message);
            }
        }

        async function disconnectForce(connectionId) {
            if (!confirm('确定要强制断开此连接吗？')) return;
            
            try {
                const response = await chrome.runtime.sendMessage({
                    action: 'QMSY_DISCONNECT',
                    connectionId: connectionId,
                    reason: 'Force disconnected from popup',
                    force: true
                });
                
                updateStatus();
                setTimeout(updateStatus, 300);
            } catch (error) {
                alert('强制断开失败: ' + error.message);
            }
        }

        async function disconnectAll() {
            const count = document.querySelectorAll('.connection-item').length;
            if (!confirm(`确定要断开全部 ${count} 个连接吗？`)) return;
            
            try {
                const response = await chrome.runtime.sendMessage({
                    action: 'QMSY_DISCONNECT_ALL',
                    reason: 'Disconnected all from popup'
                });
                
                updateStatus();
                // 多次刷新确保状态同步
                setTimeout(updateStatus, 300);
                setTimeout(updateStatus, 1000);
            } catch (error) {
                alert('批量断开失败: ' + error.message);
            }
        }

        function refresh() {
            updateStatus();
        }

        function startAutoRefresh() {
            if (autoRefreshTimer) clearInterval(autoRefreshTimer);
            autoRefreshTimer = setInterval(updateStatus, 2000); // 改为2秒刷新
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        // 初始化
        updateStatus();
        startAutoRefresh();

        // 页面可见性变化时控制刷新
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopAutoRefresh();
            } else {
                updateStatus();
                startAutoRefresh();
            }
        });
    </script>
</body>
</html>
